name: Get Hot News

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      # - name: Check Expiration
      #   env:
      #     GH_TOKEN: ${{ github.token }}
      #   run: |
      #     WORKFLOW_FILE="crawler.yml"
      #     API_URL="repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs"
      #     TOTAL=$(gh api "$API_URL" --jq '.total_count')
      #     if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
      #       echo "No previous runs found"
      #     else
      #       LAST_PAGE=$(( (TOTAL + 99) / 100 ))
      #       FIRST_RUN_DATE=$(gh api "$API_URL?per_page=100&page=$LAST_PAGE" --jq '.workflow_runs[-1].created_at')
      #       if [ -n "$FIRST_RUN_DATE" ]; then
      #         CURRENT_TIMESTAMP=$(date +%s)
      #         FIRST_RUN_TIMESTAMP=$(date -d "$FIRST_RUN_DATE" +%s)
      #         DIFF_SECONDS=$((CURRENT_TIMESTAMP - FIRST_RUN_TIMESTAMP))
      #         if [ $DIFF_SECONDS -gt 604800 ]; then
      #           gh workflow disable "$WORKFLOW_FILE"
      #           exit 1
      #         fi
      #       fi
      #     fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run crawler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar

      # 🚀 这里的逻辑变了：把 current.html 变成 index.html 并直接传到根目录
      - name: Prepare Index File
        run: |
          mkdir -p deploy
          cp output/html/latest/current.html deploy/index.html

      - name: Deploy to R2 Root
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT_URL }}
          SOURCE_DIR: 'deploy'
