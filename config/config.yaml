# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 (Web3 村长专用版)
#                     Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true

# ===============================================================
# 1.5 调度系统
# 💡 设为 false 以确保你手动点击 Run Workflow 时能立刻收到电报
# ===============================================================
schedule:
  enabled: false 
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台 (看宏观金融与国内情绪)
# ===============================================================
platforms:
  enabled: true
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "bilibili-hot-search"
      name: "B站热搜"

# ===============================================================
# 3. 数据源 - RSS 订阅 (Web3 核心情报站)
# ===============================================================
rss:
  enabled: true
  feeds:
    - id: "theblockbeats"
      name: "律动"
      url: "https://web3rss.vercel.app/theblockbeats" # 使用中转源更稳
    - id: "foresight"
      name: "Foresight"
      url: "https://web3rss.vercel.app/foresightnews"
    - id: "chaincatcher"
      name: "链捕手"
      url: "https://web3rss.vercel.app/chaincatcher"
    - id: "goldenfinance"
      name: "金色财经"
      url: "http://api.jinse.com/no_auth/v1/ss/rss"
      # --- 👨‍🌾 村长私人领地 ---
    - id: "cunzhang-blog"
      name: "村长博客"
      url: "https://www.cunzhangblog.com/feed" # 如果你的域名变了，请记得修改这里
      display:
  standalone:
    # 把村长博客加入独立分析区，AI 会专门为你的文章写摘要
    rss_feeds: ["cunzhang-blog", "theblockbeats", "foresight-news"]
    max_items: 20

# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

# ===============================================================
# 4.5 筛选策略 (由 AI 决定哪些内容符合 Web3 村长的兴趣)
# ===============================================================
filter:
  method: "ai"
  priority_sort_enabled: true

# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: true  # 开启独立展示，确保 Web3 资讯不被漏掉
    ai_analysis: true
  standalone:
    # 强制 AI 深度分析这几个 Web3 源
    platforms: ["wallstreetcn-hot"]
    rss_feeds: ["theblockbeats", "foresight-news", "wushuo-blockchain"]
    max_items: 15

# ===============================================================
# 6. 推送通知
# ===============================================================
notification:
  enabled: true
  channels:
    telegram:
      bot_token: ""  # 从 GitHub Secrets 读取 TELEGRAM_BOT_TOKEN
      chat_id: ""    # 从 GitHub Secrets 读取 TELEGRAM_CHAT_ID

# ===============================================================
# 7. 存储配置 (R2 远程存储，用于查看历史记录)
# ===============================================================
storage:
  backend: "remote"  # 激活 R2 模式

  formats:
    sqlite: true     # 存储历史数据库
    html: true       # 生成网页版历史报告

  local:
    data_dir: "output"
  
  remote:
    retention_days: 0
    # 保持为空，程序会自动识别 S3_ 开头的 Secrets
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-chat"
  api_key: ""        # 从 GitHub Secrets 读取 AI_API_KEY
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true  # Web3 分析必须包含 RSS 内容
  include_standalone: true
  include_rank_timeline: true

# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: true
  language: "中文"
  scope:
    hotlist: false
    rss: true
    standalone: true

# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false
  crawler:
    request_interval: 2000
  rss:
    request_interval: 1000
    timeout: 15
